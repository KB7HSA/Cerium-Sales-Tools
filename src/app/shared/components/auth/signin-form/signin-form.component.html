
  <div class="w-full max-w-md pt-10 mx-auto">
    <a
      routerLink="/"
      class="inline-flex items-center text-sm text-gray-500 transition-colors hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 20 20" fill="none" class="size-5"><path d="M12.7083 5L7.5 10.2083L12.7083 15.4167" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      Back to dashboard
    </a>
  </div>

  <div class="flex flex-col justify-center flex-1 w-full max-w-md mx-auto">
    <div>
      <div class="mb-5 sm:mb-8">
        <h1 class="mb-2 font-semibold text-gray-800 text-title-sm dark:text-white/90 sm:text-title-md">
          Sign In
        </h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          Sign in with your Microsoft 365 account
        </p>
      </div>

      <!-- OAuth Buttons -->
      <div class="flex flex-col gap-3">
        <!-- Microsoft 365 Button -->
        <button 
          type="button"
          (click)="signInWithMicrosoft()"
          [disabled]="isLoggingIn"
          class="inline-flex items-center justify-center gap-3 py-4 text-sm font-medium text-gray-700 transition-colors bg-gray-100 rounded-lg px-7 hover:bg-gray-200 hover:text-gray-800 dark:bg-white/5 dark:text-white/90 dark:hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed">
          <svg
            width="24"
            height="24"
            viewBox="0 0 23 23"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M11 0H0V11H11V0Z" fill="#F25022"/>
            <path d="M23 0H12V11H23V0Z" fill="#7FBA00"/>
            <path d="M11 12H0V23H11V12Z" fill="#00A4EF"/>
            <path d="M23 12H12V23H23V12Z" fill="#FFB900"/>
          </svg>
          <span *ngIf="!isLoggingIn">Sign in with Microsoft 365</span>
          <span *ngIf="isLoggingIn">Signing in...</span>
        </button>

        <button
          *ngIf="showDevelopmentBypass"
          type="button"
          (click)="useDevelopmentBypass()"
          class="inline-flex items-center justify-center gap-3 py-4 text-sm font-medium text-amber-900 transition-colors rounded-lg px-7 bg-amber-100 hover:bg-amber-200"
        >
          Continue with development bypass
        </button>
      </div>

      <div *ngIf="loginError" class="mt-3 text-sm text-error-500">
        {{ loginError }}
      </div>

      <p *ngIf="showDevelopmentBypass" class="mt-3 text-xs text-gray-500 dark:text-gray-400">
        Development-only shortcut for local UI testing without Microsoft sign-in.
      </p>
    </div>
  </div>
