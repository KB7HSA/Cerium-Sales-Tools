# Cerium Sales Tools — production stack (Ubuntu 24.04 + Docker)
# Run: ./deploy/deploy.sh

services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        APP_URL: ${APP_URL:-http://localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - CORS_ORIGIN=${APP_URL:-http://localhost}
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=${SA_PASSWORD}
      - DB_NAME=${DB_NAME:-CeriumSalesTools}
      - DB_ENCRYPT=false
      - DB_TRUST_CERT=true
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sqldata:/var/opt/mssql
      - ./db:/db:ro
    healthcheck:
      # Use MSSQL_SA_PASSWORD (set above) — SA_PASSWORD is not in this container env.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 60s
    restart: unless-stopped

volumes:
  sqldata:
