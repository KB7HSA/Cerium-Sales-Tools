# Cerium Sales Tools — production stack (Ubuntu 24.04 + Docker)
# Run: ./deploy/deploy.sh

services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        APP_URL: ${APP_URL:-http://localhost}
        AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
        AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ${NGINX_CONF:-./nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - CORS_ORIGIN=${APP_URL:-http://localhost}
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=${SA_PASSWORD}
      - DB_NAME=${DB_NAME:-CeriumSalesTools}
      - DB_ENCRYPT=false
      - DB_TRUST_CERT=true
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sqldata:/var/opt/mssql
      - ./db:/db:ro
      - ./deploy/sqlserver-healthcheck.sh:/healthcheck.sh:ro
    healthcheck:
      test: ["CMD", "/bin/bash", "/healthcheck.sh"]
      interval: 10s
      timeout: 15s
      retries: 30
      start_period: 90s
    restart: unless-stopped

volumes:
  sqldata:
